<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Dashboard - NMIMS Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="left">
            <div class="logo"><img src="/images/logo.png" alt="NMIMS"></div>
            <nav class="nav-links">
                <a href="/admin/dashboard" class="active">Blog Posts</a>
            </nav>
        </div>
        <div class="right">
            <a href="/" target="_blank" style="font-size:13px; color:#666; text-decoration:none;">View Site ↗</a>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Dashboard -->
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Blog Posts</h1>
            <a href="/admin/editor" class="btn-new-blog">+ New Blog Post</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Posts</div>
                <div class="value purple" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Published</div>
                <div class="value green" id="statPublished">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Drafts</div>
                <div class="value orange" id="statDrafts">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Scheduled</div>
                <div class="value blue" id="statScheduled">0</div>
            </div>
        </div>

        <!-- Blog Table -->
        <div class="blog-table-card">
            <div class="table-header">
                <h2>All Posts</h2>
                <div class="table-filters">
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option value="published">Published</option>
                        <option value="draft">Draft</option>
                        <option value="pending">Pending</option>
                        <option value="scheduled">Scheduled</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search blogs...">
                </div>
            </div>

            <table class="blog-table">
                <thead>
                    <tr>
                        <th>Blog Post</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="blogTableBody">
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No blog posts yet</h3>
                                <p>Create your first blog post to get started.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api/admin';
        let allBlogs = [];

        // Auth check
        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function setToken(t) { localStorage.setItem('admin_token', t); }

        function requireAuth() {
            if (!getToken()) {
                window.location.href = '/admin/login.html';
            }
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken()
            };
        }

        requireAuth();

        // ===== PROACTIVE TOKEN REFRESH =====
        async function refreshToken() {
            try {
                const res = await fetch(API_BASE + '/refresh-token', { method: 'POST', headers: authHeaders() });
                if (res.ok) { const data = await res.json(); if (data.success && data.token) setToken(data.token); }
            } catch (e) { /* silent */ }
        }
        setInterval(refreshToken, 6 * 60 * 60 * 1000);

        // ===== RE-AUTH MODAL =====
        function showReAuthModal(retryCallback) {
            let modal = document.getElementById('reAuthModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'reAuthModal';
                modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Poppins,sans-serif';
                modal.innerHTML = `
                    <div style="background:#fff;border-radius:16px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                        <h3 style="margin:0 0 8px;color:#333;font-size:20px;">Session Expired</h3>
                        <p style="margin:0 0 20px;color:#666;font-size:14px;">Your session has expired. Please sign in again to continue.</p>
                        <input id="reAuthUser" type="text" placeholder="Username" style="width:100%;padding:10px 12px;border:1px solid #6C4DE6;border-radius:8px;margin-bottom:10px;font-size:14px;box-sizing:border-box;font-family:inherit">
                        <input id="reAuthPass" type="password" placeholder="Password" style="width:100%;padding:10px 12px;border:1px solid #6C4DE6;border-radius:8px;margin-bottom:16px;font-size:14px;box-sizing:border-box;font-family:inherit">
                        <p id="reAuthError" style="color:#e53e3e;font-size:13px;margin:0 0 12px;display:none;"></p>
                        <div style="display:flex;gap:10px;">
                            <button id="reAuthSubmit" style="flex:1;padding:11px;background:#6C4DE6;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;">Sign In</button>
                            <button id="reAuthLogout" style="padding:11px 16px;background:#f1f1f1;color:#333;border:none;border-radius:8px;font-size:14px;cursor:pointer;">Logout</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
            }
            modal.style.display = 'flex';
            const errEl = modal.querySelector('#reAuthError');
            errEl.style.display = 'none';

            modal.querySelector('#reAuthSubmit').onclick = async () => {
                const username = modal.querySelector('#reAuthUser').value.trim();
                const password = modal.querySelector('#reAuthPass').value.trim();
                if (!username || !password) { errEl.textContent = 'Please enter credentials.'; errEl.style.display = 'block'; return; }
                const btn = modal.querySelector('#reAuthSubmit');
                btn.textContent = 'Signing in...'; btn.disabled = true;
                try {
                    const res = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    const data = await res.json();
                    if (data.success && data.token) {
                        setToken(data.token);
                        modal.style.display = 'none';
                        if (retryCallback) retryCallback();
                    } else {
                        errEl.textContent = data.message || 'Invalid credentials.'; errEl.style.display = 'block';
                        btn.textContent = 'Sign In'; btn.disabled = false;
                    }
                } catch (e) {
                    errEl.textContent = 'Login failed.'; errEl.style.display = 'block';
                    btn.textContent = 'Sign In'; btn.disabled = false;
                }
            };
            modal.querySelector('#reAuthLogout').onclick = () => { localStorage.removeItem('admin_token'); window.location.href = '/admin/login.html'; };
            modal.querySelector('#reAuthPass').onkeydown = (e) => { if (e.key === 'Enter') modal.querySelector('#reAuthSubmit').click(); };
        }
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Load blogs
        async function loadBlogs() {
            try {
                const res = await fetch(API_BASE + '/blogs', { headers: authHeaders() });
                if (res.status === 401 || res.status === 403) {
                    showReAuthModal(loadBlogs);
                    return;
                }
                const data = await res.json();
                if (data.success) {
                    allBlogs = data.data;
                    updateStats();
                    renderTable();
                }
            } catch (err) {
                showToast('Failed to load blogs', 'error');
            }
        }

        // Stats
        function updateStats() {
            document.getElementById('statTotal').textContent = allBlogs.length;
            document.getElementById('statPublished').textContent = allBlogs.filter(b => b.status === 'published').length;
            document.getElementById('statDrafts').textContent = allBlogs.filter(b => b.status === 'draft').length;
            document.getElementById('statScheduled').textContent = allBlogs.filter(b => b.status === 'scheduled').length;
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('blogTableBody');
            const statusFilter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allBlogs;
            if (statusFilter) filtered = filtered.filter(b => b.status === statusFilter);
            if (search) filtered = filtered.filter(b => 
                (b.title || '').toLowerCase().includes(search) || 
                (b.slug || '').toLowerCase().includes(search)
            );

            // Sort by updatedAt descending
            filtered.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><h3>No posts found</h3><p>Try adjusting your filters.</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(blog => {
                const date = blog.publishDate || (blog.createdAt ? blog.createdAt.split('T')[0] : '—');
                const categories = (blog.categories || []).join(', ') || '—';
                const thumb = blog.featureImage ? blog.featureImage : '';
                const thumbHtml = thumb 
                    ? `<img src="${escapeHtml(thumb)}" alt="" class="blog-thumb">` 
                    : '<div class="blog-thumb" style="background:#eee;display:flex;align-items:center;justify-content:center;font-size:18px;">📝</div>';

                return `<tr>
                    <td>
                        <div class="blog-title-cell">
                            ${thumbHtml}
                            <div class="blog-title-text">
                                <h4>${escapeHtml(blog.title || 'Untitled')}</h4>
                                <span>/blog/${escapeHtml(blog.slug || '')}</span>
                            </div>
                        </div>
                    </td>
                    <td>${escapeHtml(categories)}</td>
                    <td><span class="status-badge ${blog.status || 'draft'}">${escapeHtml(blog.status || 'draft')}</span></td>
                    <td>${escapeHtml(date)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn" onclick="editBlog('${blog.id}')" title="Edit">✏️</button>
                            ${blog.status === 'published' ? `<button class="action-btn" onclick="viewBlog('${escapeHtml(blog.slug)}')" title="View">👁️</button>` : ''}
                            <button class="action-btn delete" onclick="deleteBlog('${blog.id}')" title="Delete">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function editBlog(id) {
            window.location.href = '/admin/editor.html?id=' + id;
        }

        function viewBlog(slug) {
            window.open('/blog/' + slug, '_blank');
        }

        async function deleteBlog(id) {
            if (!confirm('Are you sure you want to delete this blog post?')) return;

            try {
                const res = await fetch(API_BASE + '/blogs/' + id, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Blog deleted successfully', 'success');
                    loadBlogs();
                } else {
                    showToast(data.message || 'Delete failed', 'error');
                }
            } catch (err) {
                showToast('Failed to delete blog', 'error');
            }
        }

        // Event listeners
        document.getElementById('filterStatus').addEventListener('change', renderTable);
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            window.location.href = '/admin/login.html';
        });

        // Init
        loadBlogs();
    </script>
</body>
</html>
