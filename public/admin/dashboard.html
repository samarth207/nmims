<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Dashboard - NMIMS Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="icon" type="image/png" href="/images/favicon.png">
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="left">
            <div class="logo"><img src="/images/logo.png" alt="NMIMS"></div>
            <nav class="nav-links">
                <a href="/admin/dashboard" class="active">Blog Posts</a>
            </nav>
        </div>
        <div class="right">
            <a href="/" target="_blank" style="font-size:13px; color:#666; text-decoration:none;">View Site ↗</a>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Dashboard -->
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Blog Posts</h1>
            <a href="/admin/editor" class="btn-new-blog">+ New Blog Post</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Posts</div>
                <div class="value purple" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Published</div>
                <div class="value green" id="statPublished">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Drafts</div>
                <div class="value orange" id="statDrafts">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Scheduled</div>
                <div class="value blue" id="statScheduled">0</div>
            </div>
        </div>

        <!-- Blog Table -->
        <div class="blog-table-card">
            <div class="table-header">
                <h2>All Posts</h2>
                <div class="table-filters">
                    <select id="filterStatus">
                        <option value="">All Status</option>
                        <option value="published">Published</option>
                        <option value="draft">Draft</option>
                        <option value="pending">Pending</option>
                        <option value="scheduled">Scheduled</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search blogs...">
                </div>
            </div>

            <table class="blog-table">
                <thead>
                    <tr>
                        <th>Blog Post</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="blogTableBody">
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No blog posts yet</h3>
                                <p>Create your first blog post to get started.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = '/api/admin';
        let allBlogs = [];

        // Auth check
        function getToken() {
            return localStorage.getItem('admin_token');
        }

        function requireAuth() {
            if (!getToken()) {
                window.location.href = '/admin/login.html';
            }
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken()
            };
        }

        requireAuth();

        // Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Load blogs
        async function loadBlogs() {
            try {
                const res = await fetch(API_BASE + '/blogs', { headers: authHeaders() });
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('admin_token');
                    window.location.href = '/admin/login.html';
                    return;
                }
                const data = await res.json();
                if (data.success) {
                    allBlogs = data.data;
                    updateStats();
                    renderTable();
                }
            } catch (err) {
                showToast('Failed to load blogs', 'error');
            }
        }

        // Stats
        function updateStats() {
            document.getElementById('statTotal').textContent = allBlogs.length;
            document.getElementById('statPublished').textContent = allBlogs.filter(b => b.status === 'published').length;
            document.getElementById('statDrafts').textContent = allBlogs.filter(b => b.status === 'draft').length;
            document.getElementById('statScheduled').textContent = allBlogs.filter(b => b.status === 'scheduled').length;
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('blogTableBody');
            const statusFilter = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allBlogs;
            if (statusFilter) filtered = filtered.filter(b => b.status === statusFilter);
            if (search) filtered = filtered.filter(b => 
                (b.title || '').toLowerCase().includes(search) || 
                (b.slug || '').toLowerCase().includes(search)
            );

            // Sort by updatedAt descending
            filtered.sort((a, b) => new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt));

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><h3>No posts found</h3><p>Try adjusting your filters.</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(blog => {
                const date = blog.publishDate || (blog.createdAt ? blog.createdAt.split('T')[0] : '—');
                const categories = (blog.categories || []).join(', ') || '—';
                const thumb = blog.featureImage ? blog.featureImage : '';
                const thumbHtml = thumb 
                    ? `<img src="${escapeHtml(thumb)}" alt="" class="blog-thumb">` 
                    : '<div class="blog-thumb" style="background:#eee;display:flex;align-items:center;justify-content:center;font-size:18px;">📝</div>';

                return `<tr>
                    <td>
                        <div class="blog-title-cell">
                            ${thumbHtml}
                            <div class="blog-title-text">
                                <h4>${escapeHtml(blog.title || 'Untitled')}</h4>
                                <span>/blog/${escapeHtml(blog.slug || '')}</span>
                            </div>
                        </div>
                    </td>
                    <td>${escapeHtml(categories)}</td>
                    <td><span class="status-badge ${blog.status || 'draft'}">${escapeHtml(blog.status || 'draft')}</span></td>
                    <td>${escapeHtml(date)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn" onclick="editBlog('${blog.id}')" title="Edit">✏️</button>
                            ${blog.status === 'published' ? `<button class="action-btn" onclick="viewBlog('${escapeHtml(blog.slug)}')" title="View">👁️</button>` : ''}
                            <button class="action-btn delete" onclick="deleteBlog('${blog.id}')" title="Delete">🗑️</button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function editBlog(id) {
            window.location.href = '/admin/editor.html?id=' + id;
        }

        function viewBlog(slug) {
            window.open('/blog/' + slug, '_blank');
        }

        async function deleteBlog(id) {
            if (!confirm('Are you sure you want to delete this blog post?')) return;

            try {
                const res = await fetch(API_BASE + '/blogs/' + id, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Blog deleted successfully', 'success');
                    loadBlogs();
                } else {
                    showToast(data.message || 'Delete failed', 'error');
                }
            } catch (err) {
                showToast('Failed to delete blog', 'error');
            }
        }

        // Event listeners
        document.getElementById('filterStatus').addEventListener('change', renderTable);
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            window.location.href = '/admin/login.html';
        });

        // Init
        loadBlogs();
    </script>
</body>
</html>
